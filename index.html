<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N2 Japanese Grammar Study Tool</title>
<style>
  :root {
    --purple:#6c5ce7; --purple-light:#a29bfe; --purple-dark:#4a3ab5;
    --teal:#00b894; --orange:#e17055; --yellow:#fdcb6e;
    --bg:#f0eeff; --text:#2d3436; --muted:#636e72; --border:#dfe6e9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

  /* HEADER */
  .app-header{background:linear-gradient(135deg,var(--purple-dark),var(--purple),#9b59b6);color:#fff;padding:28px 30px 20px;text-align:center;}
  .app-header h1{font-size:26px;letter-spacing:.5px;}
  .app-header p{opacity:.85;font-size:14px;margin-top:6px;}
  #unitCount{font-weight:700;}
  .unit-filter{display:flex;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap;}
  .unit-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.45);color:#fff;padding:6px 18px;border-radius:20px;cursor:pointer;font-size:13px;transition:background .2s;}
  .unit-btn.active,.unit-btn:hover{background:rgba(255,255,255,.38);}

  /* NAV */
  .nav-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:50;overflow-x:auto;}
  .nav-btn{flex:1;padding:15px 10px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;min-width:90px;}
  .nav-btn.active{color:var(--purple);border-bottom-color:var(--purple);}
  .nav-btn:hover:not(.active){background:var(--bg);}

  /* CONTENT */
  .content{padding:28px 24px;max-width:960px;margin:0 auto;}
  .tab-panel{display:none;animation:fadeIn .25s ease;}
  .tab-panel.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* OVERVIEW */
  .section-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--purple);margin:24px 0 12px;padding-left:4px;}
  .grammar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .g-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .2s;}
  .g-card:hover{border-color:var(--purple-light);box-shadow:0 6px 18px rgba(108,92,231,.15);transform:translateY(-2px);}
  .g-card .pattern{font-size:17px;font-weight:700;color:var(--purple);margin-bottom:5px;}
  .g-card .english{font-size:13px;color:var(--muted);}
  .g-card .unit-tag{display:inline-block;font-size:11px;background:var(--bg);color:var(--purple);padding:2px 8px;border-radius:10px;margin-top:8px;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:#fff;border-radius:16px;max-width:680px;width:100%;max-height:88vh;overflow-y:auto;padding:32px 28px;box-shadow:0 24px 64px rgba(0,0,0,.3);}
  .modal-close{float:right;font-size:26px;cursor:pointer;color:var(--muted);line-height:1;}
  .modal-close:hover{color:var(--text);}
  .modal-pattern{font-size:26px;font-weight:800;color:var(--purple);margin-bottom:4px;}
  .modal-english{font-size:15px;color:var(--muted);font-style:italic;margin-bottom:16px;}
  .modal-meaning{background:#f5f3ff;border-left:4px solid var(--purple);padding:14px 16px;border-radius:6px;margin-bottom:20px;font-size:14px;line-height:1.7;color:#333;}
  .modal-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--purple);margin:20px 0 10px;}
  .example-block{background:#fafafa;border-left:3px solid var(--purple-light);padding:12px 14px;margin-bottom:10px;border-radius:6px;}
  .example-block .jp{font-size:15px;color:var(--text);margin-bottom:5px;font-weight:500;}
  .example-block .en{font-size:13px;color:var(--muted);font-style:italic;}
  .note-block{background:#fffbea;border-left:4px solid var(--yellow);padding:12px 14px;border-radius:6px;font-size:13px;line-height:1.65;color:#555;}
  .practice-btn{display:inline-block;margin-top:22px;background:var(--purple);color:#fff;border:none;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:background .2s;}
  .practice-btn:hover{background:var(--purple-dark);}

  /* FLASHCARDS */
  .fc-meta{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:22px;}
  .fc-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 22px;text-align:center;min-width:110px;}
  .fc-stat .val{font-size:22px;font-weight:800;color:var(--purple);}
  .fc-stat .lbl{font-size:11px;color:var(--muted);margin-top:3px;}
  .fc-wrapper{perspective:1200px;height:280px;cursor:pointer;user-select:none;margin-bottom:20px;}
  .fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);border-radius:16px;}
  .fc-inner.flipped{transform:rotateY(180deg);}
  .fc-face{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;backface-visibility:hidden;text-align:center;}
  .fc-front{background:linear-gradient(135deg,var(--purple),#9b59b6);color:#fff;}
  .fc-back{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;transform:rotateY(180deg);}
  .fc-face .big{font-size:28px;font-weight:800;margin-bottom:10px;}
  .fc-face .small{font-size:14px;opacity:.85;}
  .fc-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;}
  .fc-nav{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px;}

  /* BUTTONS */
  .btn{background:var(--purple);color:#fff;border:none;padding:11px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;}
  .btn:hover{background:var(--purple-dark);transform:translateY(-1px);}
  .btn.sec{background:var(--border);color:var(--text);}
  .btn.sec:hover{background:#c8d6e5;}
  .btn.green{background:var(--teal);}
  .btn.green:hover{background:#00a381;}
  .btn.red{background:var(--orange);}
  .btn.red:hover{background:#c0392b;}

  /* QUIZ */
  .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .quiz-header h2{font-size:18px;}
  .quiz-score{background:var(--purple);color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;}
  .q-block{background:#fff;border-radius:12px;padding:24px;margin-bottom:18px;border:2px solid var(--border);}
  .q-number{font-size:11px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .q-text{font-size:16px;color:var(--text);margin-bottom:18px;line-height:1.6;}
  .q-jp{font-size:18px;font-weight:600;margin-bottom:16px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{padding:13px 16px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;transition:all .2s;background:#fff;}
  .opt:hover{border-color:var(--purple-light);background:#f5f3ff;}
  .opt.correct{border-color:var(--teal);background:#e8fff8;color:#00745c;pointer-events:none;}
  .opt.wrong{border-color:var(--orange);background:#fff4f0;color:#a0522d;pointer-events:none;}
  .opt.disabled{pointer-events:none;}
  .q-feedback{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.6;}
  .q-feedback.ok{background:#e8fff8;color:#00745c;border-left:4px solid var(--teal);}
  .q-feedback.err{background:#fff4f0;color:#a0522d;border-left:4px solid var(--orange);}
  .quiz-controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
  .quiz-end{background:#fff;border-radius:16px;padding:40px 30px;text-align:center;border:2px solid var(--border);}
  .quiz-end .score-big{font-size:60px;font-weight:900;color:var(--purple);}
  .quiz-end p{font-size:16px;color:var(--muted);margin-top:8px;}

  /* MATCH GAME */
  .game-meta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .g-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 20px;text-align:center;}
  .g-stat .val{font-size:20px;font-weight:800;color:var(--purple);}
  .g-stat .lbl{font-size:11px;color:var(--muted);}
  .match-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 auto;}
  .m-tile{background:var(--purple);color:#fff;border:none;border-radius:10px;padding:14px 8px;font-size:13px;font-weight:600;cursor:pointer;min-height:72px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;transition:all .2s;word-break:break-word;}
  .m-tile:hover:not(:disabled){transform:scale(1.04);box-shadow:0 4px 14px rgba(108,92,231,.35);}
  .m-tile.selected{background:#9b59b6;box-shadow:0 0 0 3px var(--yellow);}
  .m-tile.matched{background:var(--teal);cursor:default;}
  .m-tile.wrong-flash{background:var(--orange);}
  .m-tile:disabled{cursor:default;}
  .match-info{text-align:center;color:var(--muted);font-size:14px;margin-top:14px;}

  /* SPEED ROUND */
  .speed-container{background:#fff;border-radius:16px;padding:30px;border:2px solid var(--border);text-align:center;}
  .speed-timer{font-size:48px;font-weight:900;color:var(--purple);margin:10px 0;}
  .speed-timer.urgent{color:var(--orange);}
  .speed-q{font-size:22px;font-weight:700;margin:20px 0 10px;}
  .speed-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
  .speed-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px;margin:0 auto;}
  .speed-opt{padding:16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;background:#fff;}
  .speed-opt:hover{border-color:var(--purple-light);background:#f5f3ff;}
  .speed-opt.correct{background:#e8fff8;border-color:var(--teal);color:#00745c;pointer-events:none;}
  .speed-opt.wrong{background:#fff4f0;border-color:var(--orange);color:#a0522d;pointer-events:none;}
  .speed-streak{font-size:13px;color:var(--muted);margin-top:16px;}

  /* FILL-IN */
  .fill-input{width:100%;padding:12px 14px;font-size:16px;border:2px solid var(--border);border-radius:8px;margin-top:8px;transition:border-color .2s;font-family:inherit;}
  .fill-input:focus{outline:none;border-color:var(--purple);}
  .fill-input.correct-input{border-color:var(--teal);background:#e8fff8;}
  .fill-input.wrong-input{border-color:var(--orange);background:#fff4f0;}

  @media(max-width:600px){
    .match-board{grid-template-columns:repeat(3,1fr);}
    .speed-opts{grid-template-columns:1fr;}
    .fc-face .big{font-size:21px;}
    .content{padding:18px 14px;}
    .nav-btn{font-size:12px;padding:12px 6px;}
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>📚 N2 Japanese Grammar</h1>
  <p><span id="unitCount">—</span> grammar patterns across all units</p>
  <div class="unit-filter" id="unitFilter"></div>
</div>

<div class="nav-tabs">
  <button class="nav-btn active" data-tab="overview">📖 Overview</button>
  <button class="nav-btn" data-tab="flashcards">🃏 Flashcards</button>
  <button class="nav-btn" data-tab="quiz">📝 Quiz</button>
  <button class="nav-btn" data-tab="match">🎮 Match</button>
  <button class="nav-btn" data-tab="speed">⚡ Speed</button>
  <button class="nav-btn" data-tab="fill">✏️ Fill-in</button>
</div>

<div class="content">
  <div id="overview"   class="tab-panel active"></div>
  <div id="flashcards" class="tab-panel"></div>
  <div id="quiz"       class="tab-panel"></div>
  <div id="match"      class="tab-panel"></div>
  <div id="speed"      class="tab-panel"></div>
  <div id="fill"       class="tab-panel"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Load grammar data first, then app logic -->
<script src="grammar-data.js"></script>
<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let activeUnit = 'all';
let fcList = [], fcIdx = 0, fcKnown = new Set();
let matchPairs = 6, matchSelected = null, matchLocked = false, matchAttempts = 0, matchMatches = 0;
let matchTiles = [];
let quizItems = [], quizScore = 0, quizAnswered = 0;
let fillItems = [];
let speedItems = [], speedIdx = 0, speedScore = 0, speedStreak = 0, speedTimer = null, speedTimeLeft = 15;

// ── Helpers ──────────────────────────────────
function filtered() {
  return activeUnit === 'all' ? GRAMMAR : GRAMMAR.filter(g => g.unit === activeUnit);
}
function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }

// ══════════════════════════════════════════════
//  BOOT — build unit filter buttons dynamically
// ══════════════════════════════════════════════
function boot() {
  const units = [...new Set(GRAMMAR.map(g => g.unit))].sort();
  document.getElementById('unitCount').textContent = GRAMMAR.length;
  const filter = document.getElementById('unitFilter');
  filter.innerHTML = `<button class="unit-btn active" onclick="filterUnit('all',this)">All Units</button>`
    + units.map(u => `<button class="unit-btn" onclick="filterUnit('${u}',this)">${u}</button>`).join('');
  renderOverview();
}

// ══════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const t = btn.dataset.tab;
    document.getElementById(t).classList.add('active');
    if (t === 'flashcards') initFC();
    if (t === 'quiz')       initQuiz();
    if (t === 'fill')       initFill();
    if (t === 'match')      startMatch();
    if (t === 'speed')      renderSpeedStart();
  });
});

// ══════════════════════════════════════════════
//  UNIT FILTER
// ══════════════════════════════════════════════
function filterUnit(unit, btn) {
  activeUnit = unit;
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOverview();
}

// ══════════════════════════════════════════════
//  OVERVIEW
// ══════════════════════════════════════════════
function renderOverview() {
  const list = filtered();
  const units = [...new Set(list.map(g => g.unit))];
  let html = '';
  units.forEach(unit => {
    const items = list.filter(g => g.unit === unit);
    html += `<div class="section-label">📘 ${unit} — ${items.length} patterns</div><div class="grammar-grid">`;
    items.forEach(g => {
      html += `<div class="g-card" onclick="openModal(${g.id})">
        <div class="pattern">${g.pattern}</div>
        <div class="english">${g.english}</div>
        <span class="unit-tag">${g.unit}</span>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('overview').innerHTML = html;
}

// ══════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════
function openModal(id) {
  const g = GRAMMAR.find(x => x.id === id);
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-pattern">${g.pattern}</div>
    <div class="modal-english">${g.english} &nbsp;·&nbsp; <em>${g.unit}</em></div>
    <div class="modal-meaning">${g.meaning}</div>
    <div class="modal-section-title">📐 Structure</div>
    <div class="note-block" style="border-color:#a29bfe;">${g.structure}</div>
    <div class="modal-section-title">✏️ Examples</div>
    ${g.examples.map((e,i)=>`<div class="example-block">
      <div class="jp">例${i+1}) ${e.jp}</div>
      <div class="en">${e.en}</div>
    </div>`).join('')}
    <div class="modal-section-title">💡 Note</div>
    <div class="note-block">${g.note}</div>
    ${g.compareTo ? `<div class="modal-section-title">🔄 Compare to</div>
    <div class="note-block" style="border-color:#00b894;">${g.compareTo}</div>` : ''}
    <button class="practice-btn" onclick="closeModal();quickQuiz(${g.id})">📝 Quick quiz on this</button>
  `;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ══════════════════════════════════════════════
//  FLASHCARDS
// ══════════════════════════════════════════════
function initFC() {
  fcList = shuffle(filtered());
  fcIdx = 0;
  document.getElementById('flashcards').innerHTML = `
    <div class="fc-meta">
      <div class="fc-stat"><div class="val" id="fcCurrent">1</div><div class="lbl">Card</div></div>
      <div class="fc-stat"><div class="val" id="fcTotal">${fcList.length}</div><div class="lbl">Total</div></div>
      <div class="fc-stat"><div class="val" id="fcKnown">0</div><div class="lbl">Known ✓</div></div>
    </div>
    <div class="fc-wrapper" id="fcWrapper" onclick="flipCard()">
      <div class="fc-inner" id="fcInner">
        <div class="fc-face fc-front">
          <div class="big" id="fcFront">—</div>
          <div class="small" id="fcFrontSub"></div>
        </div>
        <div class="fc-face fc-back">
          <div class="big" id="fcBack">—</div>
          <div class="small" id="fcBackSub"></div>
        </div>
      </div>
    </div>
    <div class="fc-hint">Tap the card to flip</div>
    <div class="fc-nav">
      <button class="btn sec" onclick="fcNav(-1)">← Prev</button>
      <button class="btn red" onclick="markCard(false)">✗ Still learning</button>
      <button class="btn green" onclick="markCard(true)">✓ Know it</button>
      <button class="btn sec" onclick="fcNav(1)">Next →</button>
    </div>
    <div class="fc-nav" style="margin-top:10px;">
      <button class="btn sec" onclick="initFC()">🔀 Shuffle</button>
      <button class="btn sec" onclick="resetFC()">↺ Reset</button>
    </div>`;
  renderFC();
}
function renderFC() {
  const g = fcList[fcIdx];
  document.getElementById('fcFront').textContent = g.pattern;
  document.getElementById('fcFrontSub').textContent = g.unit;
  document.getElementById('fcBack').textContent = g.english;
  document.getElementById('fcBackSub').textContent = g.examples[0].en;
  document.getElementById('fcInner').classList.remove('flipped');
  document.getElementById('fcCurrent').textContent = fcIdx + 1;
  document.getElementById('fcKnown').textContent = fcKnown.size;
}
function flipCard()  { document.getElementById('fcInner').classList.toggle('flipped'); }
function fcNav(dir)  { fcIdx = (fcIdx + dir + fcList.length) % fcList.length; renderFC(); }
function markCard(known) { known ? fcKnown.add(fcList[fcIdx].id) : fcKnown.delete(fcList[fcIdx].id); fcNav(1); }
function resetFC()   { fcKnown.clear(); initFC(); }

// ══════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════
function initQuiz() {
  const pool = filtered();
  quizScore = 0; quizAnswered = 0;
  quizItems = buildQuiz(pool, Math.min(10, pool.length));
  renderQuiz();
}
function quickQuiz(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="quiz"]').classList.add('active');
  document.getElementById('quiz').classList.add('active');
  const g = GRAMMAR.find(x => x.id === id);
  const pool = GRAMMAR;
  quizScore = 0; quizAnswered = 0;
  const others = shuffle(pool.filter(x => x.id !== id));
  quizItems = [
    { text:`What does "${g.pattern}" mean?`,
      opts:shuffle([g.english, others[0].english, others[1].english, others[2].english]),
      answer:g.english, explanation:g.note },
    { text:`Which grammar means "${g.english}"?`,
      opts:shuffle([g.pattern, others[0].pattern, others[1].pattern, others[2].pattern]),
      answer:g.pattern, explanation:`Structure: ${g.structure}` },
    { text:`Which example correctly uses "${g.pattern}"?`,
      opts:shuffle([g.examples[0].jp, others[0].examples[0].jp, others[1].examples[0].jp, others[2].examples[0].jp]),
      answer:g.examples[0].jp, explanation:`Translation: ${g.examples[0].en}` }
  ];
  renderQuiz();
}
function buildQuiz(pool, n) {
  const items = [];
  shuffle(pool).slice(0, n).forEach((g, i) => {
    const others = shuffle(pool.filter(x => x.id !== g.id));
    const type = i % 3;
    if (type === 0) {
      items.push({ text:`What does "${g.pattern}" mean?`,
        opts:shuffle([g.english, others[0].english, others[1].english, others[2].english]),
        answer:g.english, explanation:g.note });
    } else if (type === 1) {
      items.push({ text:`Which grammar means "${g.english}"?`,
        opts:shuffle([g.pattern, others[0].pattern, others[1].pattern, others[2].pattern]),
        answer:g.pattern, explanation:`Structure: ${g.structure}` });
    } else {
      items.push({ text:`Which sentence uses "${g.pattern}" correctly?`,
        opts:shuffle([g.examples[0].jp, others[0].examples[0].jp, others[1].examples[0].jp, others[2].examples[0].jp]),
        answer:g.examples[0].jp, explanation:`Translation: ${g.examples[0].en}` });
    }
  });
  return items;
}
function renderQuiz() {
  let html = `<div class="quiz-header">
    <h2>Practice Quiz</h2>
    <span class="quiz-score" id="qScore">Score: 0 / 0</span>
  </div>`;
  quizItems.forEach((q, i) => {
    html += `<div class="q-block" id="q${i}">
      <div class="q-number">Question ${i+1} of ${quizItems.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="options" id="opts${i}">
        ${q.opts.map((o,j)=>`<div class="opt" onclick="checkQ(${i},${j})">${o}</div>`).join('')}
      </div>
      <div id="fb${i}"></div>
    </div>`;
  });
  html += `<div class="quiz-controls">
    <button class="btn" onclick="initQuiz()">🔄 New Quiz</button>
    <button class="btn sec" onclick="showFinalScore()">See Final Score</button>
  </div>`;
  document.getElementById('quiz').innerHTML = html;
}
function checkQ(qi, oi) {
  const q = quizItems[qi];
  const opts = document.querySelectorAll(`#opts${qi} .opt`);
  opts.forEach(o => o.classList.add('disabled'));
  const correct = opts[oi].textContent.trim() === q.answer;
  opts.forEach(o => { if (o.textContent.trim() === q.answer) o.classList.add('correct'); });
  if (!correct) opts[oi].classList.add('wrong');
  quizAnswered++; if (correct) quizScore++;
  document.getElementById('qScore').textContent = `Score: ${quizScore} / ${quizAnswered}`;
  document.getElementById(`fb${qi}`).innerHTML =
    `<div class="q-feedback ${correct?'ok':'err'}">${correct?'✓ Correct!':'✗ Incorrect.'} ${q.explanation}</div>`;
}
function showFinalScore() {
  const pct = quizItems.length > 0 ? Math.round(quizScore/quizItems.length*100) : 0;
  document.getElementById('quiz').innerHTML = `<div class="quiz-end">
    <div style="font-size:40px;">${pct>=80?'🎉':pct>=60?'👍':'📚'}</div>
    <div class="score-big">${quizScore} / ${quizItems.length}</div>
    <p>${pct}% accuracy — ${pct>=80?'Excellent!':pct>=60?'Good, keep reviewing!':'Keep going, you\'ve got this!'}</p>
    <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn" onclick="initQuiz()">🔄 New Quiz</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
//  MATCH GAME
// ══════════════════════════════════════════════
function startMatch() {
  matchSelected = null; matchLocked = false; matchAttempts = 0; matchMatches = 0;
  const pool = shuffle(filtered()).slice(0, matchPairs);
  const tiles = [];
  pool.forEach(g => {
    tiles.push({ text:g.pattern, pairId:g.id, type:'p' });
    tiles.push({ text:g.english.split(' / ')[0], pairId:g.id, type:'e' });
  });
  shuffle(tiles);
  matchTiles = tiles.map((t,i) => ({...t, idx:i, matched:false}));

  document.getElementById('match').innerHTML = `
    <div class="game-meta">
      <div class="g-stat"><div class="val" id="gMatches">0</div><div class="lbl">Matched</div></div>
      <div class="g-stat"><div class="val" id="gAttempts">0</div><div class="lbl">Attempts</div></div>
      <div class="g-stat"><div class="val" id="gAcc">—</div><div class="lbl">Accuracy</div></div>
    </div>
    <div style="text-align:center;margin-bottom:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn" onclick="startMatch()">▶ New Game</button>
      <button class="btn sec" onclick="matchPairs=6;startMatch()">Easy (6)</button>
      <button class="btn sec" onclick="matchPairs=8;startMatch()">Hard (8)</button>
    </div>
    <div class="match-board" id="matchBoard">
      ${matchTiles.map((t,i)=>`<button class="m-tile" id="mt${i}" onclick="selectTile(${i})">${t.text}</button>`).join('')}
    </div>
    <div class="match-info" id="matchInfo">Match each grammar pattern with its meaning!</div>`;
}
function selectTile(i) {
  if (matchLocked) return;
  const t = matchTiles[i];
  if (t.matched) return;
  const el = document.getElementById(`mt${i}`);
  if (matchSelected === i) { el.classList.remove('selected'); matchSelected = null; return; }
  if (matchSelected !== null && matchTiles[matchSelected].type === t.type) {
    document.getElementById(`mt${matchSelected}`).classList.remove('selected');
    matchSelected = null;
  }
  el.classList.add('selected');
  if (matchSelected === null) { matchSelected = i; return; }
  const prev = matchTiles[matchSelected];
  const prevEl = document.getElementById(`mt${matchSelected}`);
  matchAttempts++;
  if (prev.pairId === t.pairId && prev.type !== t.type) {
    prevEl.classList.remove('selected'); prevEl.classList.add('matched'); prevEl.disabled = true;
    el.classList.remove('selected'); el.classList.add('matched'); el.disabled = true;
    prev.matched = true; t.matched = true; matchSelected = null; matchMatches++;
    updateMatchStats();
    if (matchMatches === matchPairs)
      setTimeout(()=>{ document.getElementById('matchInfo').textContent =
        `🎉 Done! ${matchMatches} pairs in ${matchAttempts} attempts — ${Math.round(matchMatches/matchAttempts*100)}% accuracy`; }, 200);
  } else {
    matchLocked = true;
    prevEl.classList.add('wrong-flash'); el.classList.add('wrong-flash');
    setTimeout(()=>{
      prevEl.classList.remove('selected','wrong-flash');
      el.classList.remove('selected','wrong-flash');
      matchSelected = null; matchLocked = false;
    }, 700);
    updateMatchStats();
  }
}
function updateMatchStats() {
  document.getElementById('gMatches').textContent = matchMatches;
  document.getElementById('gAttempts').textContent = matchAttempts;
  document.getElementById('gAcc').textContent = matchAttempts > 0
    ? Math.round(matchMatches/matchAttempts*100)+'%' : '—';
}

// ══════════════════════════════════════════════
//  SPEED ROUND  (new game)
// ══════════════════════════════════════════════
function renderSpeedStart() {
  clearInterval(speedTimer);
  document.getElementById('speed').innerHTML = `
    <div class="speed-container">
      <div style="font-size:40px;margin-bottom:16px;">⚡</div>
      <h2 style="margin-bottom:12px;">Speed Round</h2>
      <p style="color:var(--muted);margin-bottom:24px;line-height:1.6;">
        Answer as fast as you can!<br>
        15 seconds per question · Streak bonus · 10 questions
      </p>
      <button class="btn" onclick="startSpeed()">Start Speed Round</button>
    </div>`;
}
function startSpeed() {
  const pool = shuffle(filtered()).slice(0, 10);
  speedItems = pool.map(g => {
    const others = shuffle(GRAMMAR.filter(x => x.id !== g.id)).slice(0, 3);
    const type = Math.random() > .5 ? 'meaning' : 'pattern';
    return type === 'meaning'
      ? { q:g.pattern, hint:'What does this mean?', opts:shuffle([g.english,...others.map(x=>x.english)]), answer:g.english }
      : { q:g.english, hint:'Which grammar is this?', opts:shuffle([g.pattern,...others.map(x=>x.pattern)]), answer:g.pattern };
  });
  speedIdx = 0; speedScore = 0; speedStreak = 0;
  renderSpeedQ();
}
function renderSpeedQ() {
  clearInterval(speedTimer);
  if (speedIdx >= speedItems.length) { renderSpeedEnd(); return; }
  const q = speedItems[speedIdx];
  speedTimeLeft = 15;
  document.getElementById('speed').innerHTML = `
    <div class="speed-container">
      <div class="speed-timer" id="speedTimer">15</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Q${speedIdx+1} / ${speedItems.length} &nbsp;·&nbsp; Score: ${speedScore} &nbsp;·&nbsp; Streak: ${speedStreak}🔥</div>
      <div class="speed-q">${q.q}</div>
      <div class="speed-sub">${q.hint}</div>
      <div class="speed-opts" id="speedOpts">
        ${q.opts.map((o,i)=>`<button class="speed-opt" onclick="answerSpeed('${o.replace(/'/g,"\\'")}',${i})">${o}</button>`).join('')}
      </div>
    </div>`;
  speedTimer = setInterval(() => {
    speedTimeLeft--;
    const el = document.getElementById('speedTimer');
    if (!el) { clearInterval(speedTimer); return; }
    el.textContent = speedTimeLeft;
    if (speedTimeLeft <= 5) el.classList.add('urgent');
    if (speedTimeLeft <= 0) { clearInterval(speedTimer); autoFailSpeed(); }
  }, 1000);
}
function answerSpeed(chosen, idx) {
  clearInterval(speedTimer);
  const q = speedItems[speedIdx];
  const correct = chosen === q.answer;
  const opts = document.querySelectorAll('.speed-opt');
  opts.forEach(o => { o.disabled = true; if (o.textContent.trim() === q.answer) o.classList.add('correct'); });
  if (!correct) { opts[idx].classList.add('wrong'); speedStreak = 0; }
  else { speedScore += 1 + (speedTimeLeft > 10 ? 1 : 0); speedStreak++; }
  setTimeout(() => { speedIdx++; renderSpeedQ(); }, 900);
}
function autoFailSpeed() {
  speedStreak = 0;
  const q = speedItems[speedIdx];
  document.querySelectorAll('.speed-opt').forEach(o => {
    o.disabled = true; if (o.textContent.trim() === q.answer) o.classList.add('correct');
  });
  setTimeout(() => { speedIdx++; renderSpeedQ(); }, 900);
}
function renderSpeedEnd() {
  const pct = Math.round(speedScore / (speedItems.length * 2) * 100);
  document.getElementById('speed').innerHTML = `
    <div class="speed-container">
      <div style="font-size:48px;">${pct>=70?'🏆':pct>=50?'⚡':'📚'}</div>
      <div class="speed-big" style="font-size:56px;font-weight:900;color:var(--purple);margin:10px 0;">${speedScore}</div>
      <p style="color:var(--muted);">points &nbsp;·&nbsp; Best streak: ${speedStreak}🔥</p>
      <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;">
        <button class="btn" onclick="startSpeed()">▶ Play Again</button>
        <button class="btn sec" onclick="renderSpeedStart()">Back</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
//  FILL-IN
// ══════════════════════════════════════════════
function initFill() {
  const pool = shuffle(filtered());
  fillItems = pool.map(g => {
    const ex = g.examples[Math.floor(Math.random() * g.examples.length)];
    const ph = g.pattern.replace('〜','');
    const blanked = ex.jp.includes(ph) ? ex.jp.replace(ph,'＿＿＿') : ex.jp;
    return { g, ex, blanked, answered:false, correct:false, userAns:'' };
  });
  renderFill();
}
function renderFill() {
  const done  = fillItems.filter(f=>f.answered).length;
  const right = fillItems.filter(f=>f.correct).length;
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
    <h2>Fill-in Practice</h2>
    <span class="quiz-score">✓ ${right} / ${done}</span>
  </div>`;
  fillItems.forEach((fi,i) => {
    html += `<div class="q-block" id="fi${i}">
      <div class="q-number">Item ${i+1} — ${fi.g.unit}</div>
      <div class="q-text">Fill in the blank with the correct grammar:</div>
      <div class="q-jp" style="margin:10px 0;">${fi.blanked}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic;">${fi.ex.en}</div>
      ${fi.answered
        ? `<input class="fill-input ${fi.correct?'correct-input':'wrong-input'}" value="${fi.userAns}" disabled>
           <div class="q-feedback ${fi.correct?'ok':'err'}" style="margin-top:10px;">
             ${fi.correct?'✓ Correct!':'✗ Answer: '+fi.g.pattern} — ${fi.g.english}<br>
             <small>${fi.g.note}</small>
           </div>`
        : `<input class="fill-input" id="fii${i}" placeholder="Type the grammar (e.g. 〜にしては)"
             onkeydown="if(event.key==='Enter')checkFill(${i})">
           <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
             <button class="btn" onclick="checkFill(${i})">Submit</button>
             <button class="btn sec" onclick="showHint(${i})">Hint</button>
           </div>
           <div id="hint${i}" style="display:none;margin-top:8px;font-size:13px;color:var(--purple);">
             💡 Structure: ${fi.g.structure}
           </div>`}
    </div>`;
  });
  html += `<div style="text-align:center;margin-top:10px;">
    <button class="btn" onclick="initFill()">🔄 Reset</button>
  </div>`;
  document.getElementById('fill').innerHTML = html;
}
function checkFill(i) {
  const fi = fillItems[i];
  const el = document.getElementById(`fii${i}`);
  if (!el) return;
  fi.userAns = el.value.trim();
  fi.answered = true;
  fi.correct = fi.userAns === fi.g.pattern || fi.userAns === fi.g.pattern.replace('〜','');
  renderFill();
  setTimeout(() => document.getElementById(`fi${i}`)?.scrollIntoView({behavior:'smooth',block:'center'}), 100);
}
function showHint(i) {
  const el = document.getElementById(`hint${i}`);
  if (el) el.style.display = 'block';
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
boot();
</script>
